<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun Talita</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8e8ff;
overflow-x:hidden;
}

#cover{
height:100vh;
background:url('talita.jpg') center/cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
}

.overlay{
background:rgba(0,0,0,.5);
padding:30px;
border-radius:20px;
}

button{
padding:15px 30px;
border:none;
background:#ff69b4;
color:white;
font-size:18px;
border-radius:30px;
margin-top:20px;
}

#undangan{
display:none;
padding:20px;
text-align:center;
animation:fade 1s;
}

.foto{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:5px solid pink;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div id="cover">
<div class="overlay">
<h1>🎉 Birthday Invitation 🎉</h1>
<h2>Talita</h2>
<button onclick="buka()">OPEN INVITATION</button>
</div>
</div>

<div id="undangan">

<img src="talita.jpg" class="foto">

<h1>Ulang Tahun Ke-11</h1>
<h2>Talita</h2>

<div class="card">
<p>📅 26 Juni 2026</p>
<p>🕒 15.00 WIB - Selesai</p>
<p>📍 Babadan, Wlingi</p>
</div>

<div class="card">
<h3>Terima Kasih</h3>
<p>Kehadiran dan doa Anda merupakan hadiah terindah bagi Talita.</p>
</div>

</div>

<script>
function buka(){
document.getElementById("cover").style.display="none";
document.getElementById("undangan").style.display="block";
}
</script>

</body>
</html>
